name: matrix build

on:
    push:
        branches: [main]

jobs:
    build:
        runs-on: ubuntu-latest

        strategy:
            matrix:
                python-version: [3.10, 3.11, 3.12]

        steps:
            - name: code checkout
              uses: actions/checkout@4

            - name: set up python
              uses: actions/setup-python@v5
              with:
                python-version: ${{matrix.python-version}}

            - name: print python version
              run: python --version