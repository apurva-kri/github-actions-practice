name: self_hosted

on:
    workflow_dispatch:


jobs:
    detail1:
        runs-on: ubuntu-latest
        steps:
            - name: print OS name
              run: uname -a

            - name: print host name
              run: echo "hostname:$(hostname)"

            - name: print current user
              run: echo "current_user:$(whoami)"

            - name: check docker versions
              run: docker --version

            - name: check python versions 
              run: python --version

            - name: check node version
              run: node --version

            - name: check git version
              run: git --version
    detail2:
        runs-on: windows-latest
        steps:
            - name: print OS name
              run: uname -a

            - name: print host name
              run: echo "hostname:$(hostname)"

            - name: print current user
              run: echo "current_user:$(whoami)"
    detail3:
        runs-on: macos-latest
        steps:
            - name: print OS name
              run: uname -a

            - name: print host name
              run: echo "hostname:$(hostname)"

            - name: print current user
              run: echo "current_user:$(whoami)"